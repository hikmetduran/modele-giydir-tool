<!DOCTYPE html>
<html>
<head>
    <title>Appwrite Auth Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/iife/sdk.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Appwrite Authentication Debug</h1>
    
    <div>
        <button onclick="checkCurrentUser()">Check Current User</button>
        <button onclick="createAnonymousSession()">Create Anonymous Session</button>
        <button onclick="signOut()">Sign Out</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="logs"></div>

    <script>
        const APPWRITE_ENDPOINT = 'https://fra.cloud.appwrite.io/v1';
        const APPWRITE_PROJECT_ID = 'modele-giydir';
        
        const client = new Appwrite.Client()
            .setEndpoint(APPWRITE_ENDPOINT)
            .setProject(APPWRITE_PROJECT_ID);
        
        const account = new Appwrite.Account(client);
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logs.appendChild(div);
            div.scrollIntoView();
        }
        
        async function checkCurrentUser() {
            log('Checking current user...');
            try {
                const user = await account.get();
                log(`✅ User found: ${user.email || user.name || user.$id}`, 'success');
                log(`User ID: ${user.$id}`, 'info');
            } catch (error) {
                if (error.code === 401) {
                    log('ℹ️  No active session - user is anonymous (expected)', 'info');
                } else {
                    log(`❌ Error: ${error.message}`, 'error');
                }
            }
        }
        
        async function createAnonymousSession() {
            log('Creating anonymous session...');
            try {
                const session = await account.createAnonymousSession();
                log(`✅ Anonymous session created: ${session.$id}`, 'success');
                await checkCurrentUser();
            } catch (error) {
                log(`❌ Error creating anonymous session: ${error.message}`, 'error');
            }
        }
        
        async function signOut() {
            log('Signing out...');
            try {
                await account.deleteSession('current');
                log('✅ Signed out successfully', 'success');
                await checkCurrentUser();
            } catch (error) {
                log(`❌ Error signing out: ${error.message}`, 'error');
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        // Initial check
        checkCurrentUser();
    </script>
</body>
</html>
